# Cargo configuration for cross-compilation and optimization

# Linux musl targets: static CRT for fully-static binaries
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
]

[target.aarch64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
]

# Windows MSVC: dynamic CRT (-crt-static) so Rust matches ORT prebuilts.
# Pyke's prebuilt onnxruntime is compiled with /MD (dynamic CRT). Rust on
# MSVC defaults to /MT (static CRT) → __imp_* unresolved-symbol link errors.
# vcruntime140.dll is present on all Windows hosts.
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=-crt-static",
]

[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=-crt-static",
]

# macOS: dynamic lookup so optional weak symbols resolve at runtime
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
]

[registry]
default = "crates-io"

[registry.crates-io]
protocol = "sparse"

[net]
retry = 2
git-fetch-with-cli = true
