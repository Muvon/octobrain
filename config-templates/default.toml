# Octobrain Default Configuration Template
# This file contains default values for octobrain configuration
# It will be copied to the system config directory on first run

[embedding]
# Embedding model for memory operations
# Format: provider:model
#
# Default is a LOCAL model (no API key, runs on CPU, ~133MB first download):
#   fastembed:BAAI/bge-small-en-v1.5  — 384-dim, ~62 MTEB, fast + good quality
#
# Other local options (fastembed, no API key):
#   fastembed:sentence-transformers/all-MiniLM-L6-v2-quantized  (22MB, fastest)
#   fastembed:nomic-ai/nomic-embed-text-v1.5  (768-dim, 8192-ctx, 274MB)
#   fastembed:BAAI/bge-base-en-v1.5  (768-dim, ~440MB)
#   fastembed:intfloat/multilingual-e5-small  (384-dim, multilingual)
#
# Cloud providers (require API keys, generally higher quality):
#   voyage:voyage-3.5-lite           VOYAGE_API_KEY
#   openai:text-embedding-3-small    OPENAI_API_KEY
#   google:text-embedding-004        GOOGLE_API_KEY
#   jina:jina-embeddings-v3          JINA_API_KEY
model = "fastembed:nomic-ai/nomic-embed-text-v1.5"

# Batch size for embedding generation (number of texts to process at once)
# Default: 32
batch_size = 32

# Maximum tokens per batch request
# Default: 100000
max_tokens_per_batch = 100000

# Timeout in seconds for embedding generation calls (0 = no timeout)
# Default: 30
timeout_secs = 30

[search]
# Similarity threshold for memory search (0.0 to 1.0)
# Lower values = more results, higher values = fewer but more relevant
# Default: 0.3
similarity_threshold = 0.3

# Maximum number of results to return from search
# Default: 50
max_results = 50

[search.hybrid]
# Enable hybrid search (native BM25 + vector RRF fusion via LanceDB)
# When enabled, searches use LanceDB's execute_hybrid() which fuses vector and
# full-text search (BM25/Tantivy) using Reciprocal Rank Fusion (k=60).
# Default: true
enabled = true

# Weight applied to the RRF-fused score (vector + BM25 combined) (0.0-1.0)
# Default: 0.8
default_vector_weight = 0.8

# Default weight for recency signal (0.0-1.0)
# Higher = more emphasis on recently created memories
# Default: 0.1
default_recency_weight = 0.1

# Default weight for importance signal (0.0-1.0)
# Higher = more emphasis on important/frequently accessed memories
# Default: 0.1
default_importance_weight = 0.1

# Recency decay period in days
# Memories decay to ~37% relevance after this many days
# Default: 30
recency_decay_days = 30

[search.reranker]
# Enable reranking for improved search accuracy
# Uses cross-encoder models to score query-document pairs
# Improves accuracy by 20-35% and reduces hallucinations by 35%
# Default: false (disabled by default for backward compatibility)
enabled = true

# Reranker model (fully qualified, e.g., voyage:rerank-2.5, voyage:rerank-2.5-lite)
# Default: voyage:rerank-2.5
model = "fastembed:jina-reranker-v2-base-multilingual"

# Number of candidates to retrieve before reranking
# Retrieve more candidates for better reranking accuracy
# Default: 50
top_k_candidates = 50

# Number of results to return after reranking
# Default: 10
final_top_k = 10

# Timeout in seconds for reranker calls (0 = no timeout)
# Default: 30
timeout_secs = 30

[search.hyde]
# Pseudo-relevance feedback (PRF / HyDE-lite) query expansion.
# First pass retrieves top-K nearest neighbors, averages their embeddings into a
# centroid, then blends `alpha * original_query + (1 - alpha) * centroid` and uses
# the result for the actual search. Costs one extra LanceDB vector query in
# exchange for typically +10-30% recall on long-tail / underspecified queries.
# No LLM dependency — pure embedding math. Default: true (autonomous improvement)
enabled = true

# Number of nearest neighbors to average for the centroid.
# Higher = more semantic averaging, lower = closer to original intent.
# Default: 3
top_k = 3

# Blend weight on the original query embedding (0.0..1.0).
# 1.0 = no expansion, 0.5 = even mix, 0.0 = full centroid replacement.
# Default: 0.5
alpha = 0.5

[memory]
# Maximum number of memories to keep in storage
# Default: 10000
max_memories = 10000

# Automatic cleanup threshold in days
# Memories older than this may be cleaned up if below importance threshold
# Default: 365 (1 year)
auto_cleanup_days = 365

# Minimum importance for automatic cleanup
# Memories below this threshold and older than auto_cleanup_days may be removed
# Default: 0.1
cleanup_min_importance = 0.1

# Maximum memories returned in search
# Default: 50
max_search_results = 50

# Default importance for new memories (0.0-1.0)
# Default: 0.5
default_importance = 0.5

# Enable temporal decay system (Ebbinghaus forgetting curve)
# When enabled, memories naturally fade over time unless accessed
# Default: true
decay_enabled = true

# Half-life for importance decay in days (time for importance to halve)
# Higher values = slower decay, memories stay relevant longer
# Default: 90 (3 months)
decay_half_life_days = 90

# Boost factor for access reinforcement (multiplier per access)
# Higher values = stronger reinforcement from repeated access
# Default: 1.2
access_boost_factor = 1.2

# Minimum importance threshold (floor value after decay)
# Memories will never decay below this value
# Default: 0.05 (5%)
min_importance_threshold = 0.05

# Enable automatic linking between semantically similar memories
# Creates bidirectional relationships automatically (Zettelkasten-style)
# Default: true
auto_linking_enabled = true

# Similarity threshold for auto-linking (0.0-1.0)
# Higher values = only very similar memories get linked
# Recommended: 0.75-0.85 for quality links
# Default: 0.78
auto_link_threshold = 0.78

# Maximum number of auto-links per memory
# Prevents over-linking and maintains graph quality
# Recommended: 3-5 links per memory
# Default: 5
max_auto_links_per_memory = 5

# Create bidirectional links (A->B and B->A)
# Enables graph traversal in both directions
# Default: true
bidirectional_links = true

# Enable automatic cleanup of memories whose related_files no longer exist on disk.
# On startup, memories with ALL files gone are deleted; partial loss penalizes importance.
# Default: true
stale_ref_cleanup_enabled = true

# Importance penalty multiplier per missing file (0.0-1.0).
# Applied as importance *= penalty^(number_of_dead_files).
# Lower = harsher penalty. Memories with ALL files gone are deleted regardless.
# Default: 0.3
stale_ref_importance_penalty = 0.3

# Sleep consolidation: lazy autonomous compression of similar recent memories.
# Triggers on MemoryManager init via marker-file gating — no cron, no scheduler,
# no manual call. Finds clusters of similar Working-state memories created in
# the last N days, then folds each cluster into a consolidated parent via the
# same goal-anchored pipeline. Best-effort: a failed pass never blocks init.
# No LLM dependency.
# Default: true
sleep_consolidation_enabled = true

# Hours between automatic sleep-consolidation passes. Marker file gates this.
# Default: 24 (once a day)
sleep_consolidation_interval_hours = 24

# Cosine similarity threshold for two memories to share a cluster (0.0-1.0).
# Higher = stricter clusters, lower = looser.
# Default: 0.85
sleep_consolidation_threshold = 0.85

# Minimum number of memories required to form a cluster worth consolidating.
# Default: 3
sleep_consolidation_min_cluster_size = 3

# Only consider Working-state memories created in the last N days.
# Default: 7
sleep_consolidation_max_age_days = 7

[knowledge]
# Size of each child chunk in characters — what gets embedded and matched.
# Parent sections larger than this are split into children; the full section
# is stored as parent_content and returned to the user for richer context.
# Default: 1200
chunk_size = 1200

# Overlap between child chunks in characters (~25% of chunk_size)
# Maintains context across chunk boundaries
# Default: 300
chunk_overlap = 300

# Days after which indexed content is considered outdated
# Outdated content will be reindexed on next search
# Default: 15
outdating_days = 15

# Maximum number of results to return from knowledge search
# Default: 5
max_results = 5

# Hours after which session-scoped knowledge chunks are cleaned up (crash recovery)
# Default: 120
session_ttl_hours = 120
